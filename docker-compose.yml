services:
  app:
    build: .
    container_name: my_inflation_app
    ports:
      - "8080:8080"
    environment:
      DB_URL: my_inflation
      DB_USER: salles
      DB_PASSWORD: salles
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: my_inflation_db
    environment:
      POSTGRES_DB: my_inflation
      POSTGRES_USER: salles
      POSTGRES_PASSWORD: salles
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salles -d my_inflation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
