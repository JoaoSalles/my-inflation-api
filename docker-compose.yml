services:
  postgres:
    image: postgres:16-alpine
    container_name: my_inflation_db
    environment:
      POSTGRES_DB: my_inflation
      POSTGRES_USER: salles
      POSTGRES_PASSWORD: salles
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salles -d my_inflation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
